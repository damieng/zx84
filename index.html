<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ngspecz - ZX Spectrum Emulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      gap: 20px;
    }

    #sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 200px;
      flex-shrink: 0;
      padding-top: 4px;
    }
    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #toolbar h1 {
      font-size: 0.75rem;
      color: #c0c0ff;
      margin: 0;
    }
    #toolbar-btns {
      display: flex;
      gap: 2px;
    }
    #toolbar-btns button {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid #555;
      border-radius: 4px;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #toolbar-btns button:hover { background: #3a3a5e; }
    .section-label {
      font-size: 0.8rem;
      color: #999;
    }
    #sidebar label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.8rem;
      color: #999;
    }
    #sidebar select, #sidebar button {
      padding: 5px 8px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 0.85rem;
      cursor: pointer;
      width: 100%;
    }
    #sidebar button:hover { background: #3a3a5e; }
    /* Model row: select + icon buttons inline */
    #model-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #model-row select { flex: 1; min-width: 0; }
    #model-row button {
      width: 28px;
      height: 28px;
      padding: 0;
      flex-shrink: 0;
    }
    .rom-status {
      font-size: 0.75rem;
      color: #c66;
      display: none;
    }
    .clock-speed {
      font-size: 0.75rem;
      color: #8a8;
      font-family: 'Consolas', 'Courier New', monospace;
    }
    input[type="file"] { display: none; }

    /* Snapshot panel */
    #snapshot-panel {
      border-top: 1px solid #333;
      padding-top: 10px;
    }
    #snap-row {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    #snap-row button {
      flex: 1;
    }

    #main {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      background: #000;
    }
    #status-bar {
      display: flex;
      align-items: center;
      align-self: stretch;
      margin-top: 6px;
      gap: 12px;
    }
    #status {
      font-size: 0.8rem;
      color: #888;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #activity {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .led {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: #666;
    }
    .led-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      transition: background 0.05s;
    }
    .led.on .led-dot { background: #0f0; }
    .led.on { color: #8f8; }
    .led[data-kind="beep"].on .led-dot { background: #ff0; }
    .led[data-kind="beep"].on { color: #cc8; }
    .led[data-kind="ay"].on .led-dot { background: #f80; }
    .led[data-kind="ay"].on { color: #ca6; }
    .led[data-kind="tape"].on .led-dot { background: #f00; }
    .led[data-kind="tape"].on { color: #c88; }
    .led[data-kind="load"].on .led-dot { background: #f0f; }
    .led[data-kind="load"].on { color: #c8c; }
    .led[data-kind="rst16"].on .led-dot { background: #0ff; }
    .led[data-kind="rst16"].on { color: #8cc; }

    /* Display/Graphics panel */
    #display-panel {
      border-top: 1px solid #333;
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #display-controls {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }
    #display-panel label {
      flex-direction: row;
      align-items: center;
      gap: 4px;
    }
    #display-panel select {
      width: auto;
      padding: 3px 6px;
      font-size: 0.8rem;
    }
    /* Slider rows */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #ccc;
    }
    .slider-row .slider-label {
      width: 72px;
      flex-shrink: 0;
      color: #999;
    }
    .slider-row input[type="range"] {
      flex: 1;
      min-width: 0;
    }
    .slider-row .slider-value {
      width: 24px;
      text-align: right;
      font-size: 0.75rem;
      color: #888;
      flex-shrink: 0;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #444;
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #8888ff;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #8888ff;
      border: none;
      cursor: pointer;
    }

    /* Font row overrides */
    #font-row select { flex: 1; min-width: 0; }
    #font-row button { width: 28px; height: 28px; padding: 0; flex-shrink: 0; }
    #font-preview { }

    /* Sound panel */
    #sound-panel {
      border-top: 1px solid #333;
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Joystick panel */
    #joystick-panel {
      border-top: 1px solid #333;
      padding-top: 10px;
    }
    #joy-columns {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .joy-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 0;
    }
    .joy-column label {
      font-size: 0.75rem;
      color: #999;
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 100%;
    }
    .joy-column select {
      width: 100%;
      padding: 3px 4px;
      font-size: 0.8rem;
    }
    .joy-dpad {
      display: grid;
      grid-template-columns: 28px 28px 28px;
      grid-template-rows: 28px 28px 28px;
      gap: 1px;
    }
    .joy-btn {
      border: 1px solid #555;
      border-radius: 4px;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .joy-btn:hover { background: #3a3a5e; }
    .joy-btn:active, .joy-btn.pressed { background: #5a5a8e; border-color: #88f; }
    .joy-spacer { visibility: hidden; }
    .joy-fire {
      background: #3e2a2a;
      border-color: #755;
      font-size: 0.55rem;
    }
    .joy-fire:hover { background: #5e3a3a; }
    .joy-fire:active, .joy-fire.pressed { background: #8e5a5a; border-color: #f88; }
    #capture-cursor-row {
      flex-direction: row !important;
      align-items: center;
      gap: 6px !important;
      cursor: pointer;
      margin-top: 4px;
    }
    #capture-cursor-row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #6c6cff;
      cursor: pointer;
    }

    /* Right sidebar */
    #right-sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 260px;
      flex-shrink: 0;
      padding-top: 4px;
    }
    #right-sidebar label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.8rem;
      color: #999;
    }

    /* Register panel */
    #regs-panel {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #regs-label {
      font-size: 0.8rem;
      color: #999;
    }
    #regs-output {
      margin: 0;
      padding: 6px;
      background: #0a0a18;
      border: 1px solid #333;
      border-radius: 4px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.7rem;
      line-height: 1.5;
      color: #8cf;
      white-space: pre;
      overflow-x: auto;
    }
    #regs-output .reg-name { color: #999; }
    #regs-output .flag-on { color: #8f8; }
    #regs-output .flag-off { color: #444; }

    /* Memory bank config */
    #banks-output {
      margin: 0;
      padding: 6px;
      background: #0a0a18;
      border: 1px solid #333;
      border-radius: 4px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.7rem;
      line-height: 1.5;
      color: #ca8;
      white-space: pre;
    }
    #banks-output .reg-name { color: #999; }

    /* Tape panel — always visible */
    #tape-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #tape-panel-label {
      font-size: 0.8rem;
      color: #999;
    }
    #tape-controls {
      display: flex;
      gap: 2px;
    }
    #tape-controls button {
      flex: 1;
      padding: 4px 0;
      border: 1px solid #555;
      border-radius: 4px;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #tape-controls button:hover { background: #3a3a5e; }
    #tape-controls button.active {
      background: #3e2a2a;
      border-color: #a55;
      color: #f88;
    }
    #tape-blocks {
      max-height: 400px;
      overflow-y: auto;
      background: #0a0a18;
      border: 1px solid #333;
      border-radius: 4px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.7rem;
    }
    .tape-block {
      padding: 3px 6px;
      cursor: pointer;
      border-left: 3px solid transparent;
      color: #aaa;
    }
    .tape-block:hover { background: #1a1a2e; }
    .tape-block.played { color: #555; }
    .tape-block.current {
      background: #1a0a0a;
      border-left-color: #f44;
      color: #f88;
    }
    .tb-detail {
      font-size: 0.6rem;
      color: #666;
      padding-left: 14px;
    }
    .tape-block.current .tb-detail { color: #a66; }
    .tape-empty {
      padding: 8px;
      color: #555;
      font-size: 0.75rem;
      font-style: italic;
    }

    /* Diag panel */
    #diag {
      margin-top: 10px;
      width: 100%;
    }
    #diag-output {
      width: 100%;
      height: 200px;
      background: #0a0a18;
      color: #8f8;
      border: 1px solid #333;
      border-radius: 4px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.75rem;
      padding: 6px;
      resize: vertical;
      white-space: pre;
      tab-size: 8;
    }
    #diag button {
      padding: 4px 10px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 0.8rem;
      cursor: pointer;
      margin-bottom: 4px;
    }
    #diag button:hover { background: #3a3a5e; }
    #diag button.active { background: #2a3e2a; border-color: #5a5; color: #8f8; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="toolbar">
      <h1>ngspecz</h1>
      <div id="toolbar-btns">
        <button id="play-btn" title="Pause emulation">&#x23F8;</button>
        <button id="reset-btn" title="Reset machine">&#x27F3;</button>
      </div>
    </div>

    <div id="model-row">
      <select id="model">
        <option value="48k">ZX Spectrum 48K</option>
        <option value="128k">ZX Spectrum 128K</option>
        <option value="+2">ZX Spectrum +2 (Grey)</option>
      </select>
      <button id="rom-btn" title="Load ROM"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="2" width="8" height="12" rx="1"/><line x1="1" y1="5" x2="4" y2="5"/><line x1="1" y1="8" x2="4" y2="8"/><line x1="1" y1="11" x2="4" y2="11"/><line x1="12" y1="5" x2="16" y2="5"/><line x1="12" y1="8" x2="16" y2="8"/><line x1="12" y1="11" x2="16" y2="11"/></svg></button>
      <input type="file" id="rom-input" accept=".rom,.bin" multiple>
    </div>
    <span class="rom-status" id="rom-status"></span>
    <span class="clock-speed" id="clock-speed"></span>

    <div id="snapshot-panel">
      <div class="section-label">Snapshot</div>
      <div id="snap-row">
        <button id="snap-load-btn" title="Load snapshot">&#x1F4C2; Load</button>
        <button id="snap-save-btn" title="Save snapshot">&#x1F4BE; Save</button>
        <input type="file" id="snap-input" accept=".sna,.z80,.zip">
      </div>
    </div>

    <div id="joystick-panel">
      <div class="section-label">Joystick</div>
      <div id="joy-columns">
        <div class="joy-column">
          <label>P1
            <select id="joy-p1">
              <option value="kempston" selected>Kempston</option>
              <option value="cursor">Cursor</option>
              <option value="sinclair2">IF2</option>
              <option value="sinclair1">Sinclair 1</option>
              <option value="none">None</option>
            </select>
          </label>
          <div class="joy-dpad" data-player="1">
            <div class="joy-spacer"></div>
            <div class="joy-btn" data-dir="up">&#9650;</div>
            <div class="joy-spacer"></div>
            <div class="joy-btn" data-dir="left">&#9664;</div>
            <div class="joy-btn joy-fire" data-dir="fire">FIRE</div>
            <div class="joy-btn" data-dir="right">&#9654;</div>
            <div class="joy-spacer"></div>
            <div class="joy-btn" data-dir="down">&#9660;</div>
            <div class="joy-spacer"></div>
          </div>
        </div>
        <div class="joy-column">
          <label>P2
            <select id="joy-p2">
              <option value="kempston">Kempston</option>
              <option value="cursor">Cursor</option>
              <option value="sinclair2" selected>IF2</option>
              <option value="sinclair1">Sinclair 1</option>
              <option value="none">None</option>
            </select>
          </label>
          <div class="joy-dpad" data-player="2">
            <div class="joy-spacer"></div>
            <div class="joy-btn" data-dir="up">&#9650;</div>
            <div class="joy-spacer"></div>
            <div class="joy-btn" data-dir="left">&#9664;</div>
            <div class="joy-btn joy-fire" data-dir="fire">FIRE</div>
            <div class="joy-btn" data-dir="right">&#9654;</div>
            <div class="joy-spacer"></div>
            <div class="joy-btn" data-dir="down">&#9660;</div>
            <div class="joy-spacer"></div>
          </div>
        </div>
      </div>
      <label id="capture-cursor-row"><input type="checkbox" id="capture-cursor" checked> Capture cursor keys</label>
    </div>

    <div id="sound-panel">
      <div class="section-label">Sound</div>
      <div class="slider-row">
        <span class="slider-label">Volume</span>
        <input type="range" id="volume-slider" min="0" max="100" value="70">
        <span class="slider-value" id="volume-value">70</span>
      </div>
    </div>

    <div id="display-panel">
      <div class="section-label">Graphics</div>
      <div id="display-controls">
        <label>
          Scale
          <select id="scale">
            <option value="1">1x</option>
            <option value="2" selected>2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
          </select>
        </label>
        <label>
          Border
          <select id="border-size">
            <option value="2" selected>Normal</option>
            <option value="1">Small</option>
            <option value="0">None</option>
          </select>
        </label>
      </div>
      <div class="slider-row">
        <span class="slider-label">Brightness</span>
        <input type="range" id="brightness-slider" min="-50" max="50" value="0">
        <span class="slider-value" id="brightness-value">0</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Contrast</span>
        <input type="range" id="contrast-slider" min="0" max="100" value="50">
        <span class="slider-value" id="contrast-value">50</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Smoothing</span>
        <input type="range" id="smoothing-slider" min="0" max="100" value="0">
        <span class="slider-value" id="smoothing-value">0</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Curvature</span>
        <input type="range" id="curvature-slider" min="0" max="100" value="0">
        <span class="slider-value" id="curvature-value">0</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Scanlines</span>
        <input type="range" id="scanlines-slider" min="0" max="100" value="0">
        <span class="slider-value" id="scanlines-value">0</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Dotmask</span>
        <select id="dotmask-select">
          <option value="0" selected>None</option>
          <option value="2">Trinitron</option>
          <option value="3">Amstrad CTM</option>
          <option value="4">Cheap TV</option>
          <option value="5">Microvitec CUB</option>
        </select>
      </div>
      <div class="slider-row" id="font-row">
        <span class="slider-label">Font</span>
        <select id="font-select"><option value="">(none)</option></select>
        <button id="font-add-btn" title="Add font (.ch8, 768 bytes)">+</button>
      </div>
      <canvas id="font-preview" width="128" height="16" style="display:none"></canvas>
      <canvas id="rom-font-preview" width="128" height="16" style="display:none"></canvas>
      <input type="file" id="font-input" accept=".ch8,.bin">
    </div>
  </div>

  <div id="main">
    <canvas id="screen"></canvas>
    <div id="status-bar">
      <div id="status">Load a ROM to start</div>
      <div id="activity">
        <div class="led" id="led-kbd" data-kind="kbd"><span class="led-dot"></span>KBD</div>
        <div class="led" id="led-kemp" data-kind="kemp"><span class="led-dot"></span>KEMP</div>
        <div class="led" id="led-tape" data-kind="tape"><span class="led-dot"></span>TAPE</div>
        <div class="led" id="led-load" data-kind="load"><span class="led-dot"></span>LOAD</div>
        <div class="led" id="led-rst16" data-kind="rst16"><span class="led-dot"></span>RST16</div>
        <div class="led" id="led-beep" data-kind="beep"><span class="led-dot"></span>BEEP</div>
        <div class="led" id="led-ay" data-kind="ay"><span class="led-dot"></span>AY</div>
      </div>
    </div>
  </div>

  <div id="right-sidebar">
    <div id="regs-panel">
      <div id="regs-label">Registers</div>
      <pre id="regs-output"></pre>
      <pre id="banks-output"></pre>
    </div>

    <div id="tape-panel">
      <div id="tape-panel-label">Tape</div>
      <div id="tape-controls">
        <button id="tape-load-btn" title="Load tape">&#x1F4C2;</button>
        <button id="tape-rewind" title="Rewind">&#x23EE;</button>
        <button id="tape-prev" title="Previous">&#x23EA;</button>
        <button id="tape-pause" title="Pause">&#x23F8;</button>
        <button id="tape-next" title="Next">&#x23E9;</button>
      </div>
      <input type="file" id="tape-input" accept=".tap,.tzx,.zip">
      <div id="tape-blocks"></div>
    </div>

    <div id="diag">
      <button id="stuck-btn">Loop Snapshot</button>
      <button id="transcribe-btn">Transcribe</button>
      <button id="diag-copy">Copy</button>
      <textarea id="diag-output" readonly></textarea>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
